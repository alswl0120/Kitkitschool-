resolver 127.0.0.11 8.8.8.8 valid=30s;

server {
    listen 80;

    root /usr/share/nginx/html;

    set $s3_backend "https://enumalabs-userapps.s3.ap-northeast-2.amazonaws.com";

    # S3 asset fallback (local first, then S3)
    location /assets/ {
        try_files $uri @s3;
    }

    location @s3 {
        proxy_pass $s3_backend/kitkitschool-web$request_uri;
        proxy_set_header Host enumalabs-userapps.s3.ap-northeast-2.amazonaws.com;
        proxy_ssl_server_name on;
        proxy_intercept_errors on;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
