<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <!-- Background (grass) -->
  <rect width="340" height="340" fill="#EBF5FB" rx="20"/>
  <rect x="0" y="285" width="340" height="55" rx="0" fill="#A5D6A7"/>
  <path d="M0 285 Q85 270 170 285 Q255 300 340 285 L340 295 Q255 310 170 295 Q85 280 0 295 Z" fill="#81C784"/>

  <!-- Dog facing RIGHT. Tail on far left (label Tail: 12%=41, 48%=163) -->
  <!-- Tail: curled arc on left side -->
  <path d="M72 220 Q25 200 35 165 Q45 130 72 155 Q88 168 72 185"
        stroke="#D4A056" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M72 220 Q25 200 35 165 Q45 130 72 155 Q88 168 72 185"
        stroke="#E8BA70" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Body ellipse -->
  <ellipse cx="165" cy="210" rx="115" ry="72" fill="#D4A056"/>
  <ellipse cx="165" cy="210" rx="115" ry="72" fill="none" stroke="#B8863C" stroke-width="2"/>
  <!-- Belly lighter patch -->
  <ellipse cx="168" cy="222" rx="75" ry="45" fill="#F0C980" opacity="0.6"/>

  <!-- Back leg -->
  <rect x="78" y="265" width="32" height="52" rx="14" fill="#C49040"/>
  <ellipse cx="94" cy="320" rx="22" ry="10" fill="#B8863C"/>

  <!-- Front leg (right side) -->
  <rect x="225" y="265" width="32" height="52" rx="14" fill="#C49040"/>
  <ellipse cx="241" cy="320" rx="22" ry="10" fill="#B8863C"/>

  <!-- Neck -->
  <ellipse cx="248" cy="170" rx="42" ry="55" fill="#D4A056"/>

  <!-- Head circle, center ~(260, 135) -->
  <circle cx="262" cy="132" r="72" fill="#D4A056"/>
  <circle cx="262" cy="132" r="72" fill="none" stroke="#B8863C" stroke-width="2"/>

  <!-- Forehead lighter -->
  <ellipse cx="258" cy="115" rx="40" ry="30" fill="#F0C980" opacity="0.5"/>

  <!-- Ear – floppy ear at top of head, near label (72%=245, 18%=61) -->
  <path d="M228 95 Q218 50 238 42 Q262 36 268 60 Q272 85 255 100 Z" fill="#B8863C"/>
  <path d="M232 95 Q223 58 240 52 Q258 47 262 68 Q264 88 252 100 Z" fill="#C49040"/>

  <!-- Snout extending right, nose label (88%=299, 48%=163) -->
  <ellipse cx="320" cy="148" rx="28" ry="22" fill="#C49040"/>
  <path d="M262 132 Q295 130 320 148" stroke="#C49040" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Nose tip -->
  <ellipse cx="324" cy="145" rx="18" ry="14" fill="#5D2E0C"/>
  <!-- Nostrils -->
  <ellipse cx="318" cy="143" rx="5" ry="4" fill="#3E1A05"/>
  <ellipse cx="328" cy="143" rx="5" ry="4" fill="#3E1A05"/>
  <!-- Mouth line -->
  <path d="M320 155 Q315 165 308 170" stroke="#5D2E0C" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M320 155 Q325 165 332 168" stroke="#5D2E0C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="240" cy="118" r="18" fill="white"/>
  <circle cx="241" cy="119" r="11" fill="#5D4037"/>
  <circle cx="241" cy="119" r="6" fill="#1A1A1A"/>
  <circle cx="244" cy="115" r="3" fill="white"/>

  <!-- Eyebrow -->
  <path d="M224 106 Q241 98 256 107" stroke="#8D5524" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Paw label at (50%=170, 82%=279) – front left paw on ground -->
  <rect x="138" y="268" width="32" height="52" rx="14" fill="#C49040"/>
  <ellipse cx="154" cy="320" rx="22" ry="10" fill="#B8863C"/>
  <!-- Paw toes -->
  <ellipse cx="142" cy="320" rx="8" ry="5" fill="#A07030"/>
  <ellipse cx="154" cy="323" rx="8" ry="5" fill="#A07030"/>
  <ellipse cx="166" cy="320" rx="8" ry="5" fill="#A07030"/>

  <!-- Spots on body -->
  <ellipse cx="130" cy="200" rx="25" ry="18" fill="#B8863C" opacity="0.4"/>
  <ellipse cx="200" cy="215" rx="20" ry="14" fill="#B8863C" opacity="0.3"/>
</svg>
