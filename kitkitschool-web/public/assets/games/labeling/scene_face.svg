<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <!-- Background -->
  <rect width="340" height="340" fill="#EBF5FB" rx="20"/>

  <!-- Neck -->
  <rect x="145" y="305" width="50" height="35" rx="6" fill="#FFCC80"/>

  <!-- Head oval: top ~y=42, so head label at y=27 floats above -->
  <ellipse cx="170" cy="192" rx="128" ry="150" fill="#FFCC80"/>

  <!-- Hair top -->
  <ellipse cx="170" cy="55" rx="128" ry="38" fill="#5D4037"/>
  <rect x="42" y="55" width="256" height="38" fill="#5D4037"/>
  <!-- Hair line cut -->
  <path d="M42 78 Q170 48 298 78" fill="#FFCC80" stroke="none"/>

  <!-- Ears -->
  <ellipse cx="42" cy="190" rx="20" ry="28" fill="#FFB74D"/>
  <ellipse cx="298" cy="190" rx="20" ry="28" fill="#FFB74D"/>
  <ellipse cx="42" cy="190" rx="11" ry="17" fill="#FF8A65" opacity="0.35"/>
  <ellipse cx="298" cy="190" rx="11" ry="17" fill="#FF8A65" opacity="0.35"/>

  <!-- Eyebrows -->
  <path d="M88 118 Q116 106 144 118" stroke="#5D4037" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M196 118 Q224 106 252 118" stroke="#5D4037" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Left eye – white + iris, near label (35%=119, 32%=109) -->
  <ellipse cx="116" cy="145" rx="30" ry="28" fill="white" stroke="#BDBDBD" stroke-width="1"/>
  <circle cx="118" cy="147" r="19" fill="#5D4037"/>
  <circle cx="118" cy="147" r="10" fill="#1A1A1A"/>
  <circle cx="124" cy="141" r="5" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="224" cy="145" rx="30" ry="28" fill="white" stroke="#BDBDBD" stroke-width="1"/>
  <circle cx="222" cy="147" r="19" fill="#5D4037"/>
  <circle cx="222" cy="147" r="10" fill="#1A1A1A"/>
  <circle cx="228" cy="141" r="5" fill="white"/>

  <!-- Eyelid top (upper lid) -->
  <path d="M88 135 Q116 118 144 135" fill="#FFCC80" stroke="none"/>
  <path d="M196 135 Q224 118 252 135" fill="#FFCC80" stroke="none"/>

  <!-- Nose at label (50%=170, 50%=170) -->
  <path d="M156 162 L148 188 Q170 197 192 188 L184 162"
        stroke="#E65100" stroke-width="2.5" fill="#FFAB40" fill-opacity="0.4"
        stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="154" cy="188" rx="10" ry="7" fill="#FFAB40" opacity="0.55"/>
  <ellipse cx="186" cy="188" rx="10" ry="7" fill="#FFAB40" opacity="0.55"/>

  <!-- Mouth at label (50%=170, 68%=231) -->
  <path d="M124 228 Q170 268 216 228" stroke="#C62828" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M124 228 Q148 245 170 242 Q192 245 216 228 Q192 255 170 258 Q148 255 124 228 Z"
        fill="#EF9A9A" opacity="0.65"/>

  <!-- Cheek blush -->
  <ellipse cx="72" cy="220" rx="30" ry="20" fill="#FF8A65" opacity="0.25"/>
  <ellipse cx="268" cy="220" rx="30" ry="20" fill="#FF8A65" opacity="0.25"/>
</svg>
