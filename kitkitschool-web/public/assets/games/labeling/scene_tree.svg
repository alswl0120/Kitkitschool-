<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <!-- Sky -->
  <rect width="340" height="340" fill="#BBDEFB" rx="20"/>

  <!-- Ground -->
  <ellipse cx="170" cy="316" rx="145" ry="24" fill="#8BC34A"/>
  <ellipse cx="170" cy="316" rx="145" ry="24" fill="none" stroke="#7CB342" stroke-width="2"/>

  <!-- Roots visible above ground – label Root (32%=109, 88%=299) -->
  <path d="M150 286 Q118 295 100 310" stroke="#6D4C41" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M150 286 Q112 302 96 320" stroke="#6D4C41" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M165 290 Q162 308 160 325" stroke="#6D4C41" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M185 286 Q212 295 228 310" stroke="#6D4C41" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M185 286 Q218 302 232 320" stroke="#6D4C41" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Trunk – label Trunk (50%=170, 65%=221) -->
  <rect x="146" y="192" width="48" height="100" rx="12" fill="#795548"/>
  <!-- Trunk wood grain lines -->
  <path d="M153 198 Q150 242 154 285" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M165 195 Q162 245 166 288" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M178 198 Q177 242 179 285" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Branch extending RIGHT – label Branch (68%=231, 38%=129) -->
  <path d="M188 168 Q212 152 235 135" stroke="#795548" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M235 135 Q258 122 272 112" stroke="#795548" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Small branch left -->
  <path d="M155 172 Q132 158 112 148" stroke="#795548" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Canopy – multiple overlapping green circles -->
  <circle cx="170" cy="118" r="96" fill="#2E7D32"/>
  <circle cx="110" cy="130" r="72" fill="#388E3C"/>
  <circle cx="225" cy="120" r="74" fill="#33691E"/>
  <circle cx="155" cy="75" r="68" fill="#43A047"/>
  <circle cx="202" cy="82" r="62" fill="#388E3C"/>
  <circle cx="170" cy="98" r="56" fill="#4CAF50"/>
  <!-- Lighter top highlight -->
  <ellipse cx="158" cy="72" rx="40" ry="30" fill="#66BB6A" opacity="0.6"/>

  <!-- Flower in LEFT canopy – label Flower (25%=85, 22%=75) -->
  <!-- Petals -->
  <circle cx="85" cy="62" r="11" fill="#FFF59D"/>
  <circle cx="85" cy="88" r="11" fill="#FFF59D"/>
  <circle cx="71" cy="75" r="11" fill="#FFF59D"/>
  <circle cx="99" cy="75" r="11" fill="#FFF59D"/>
  <circle cx="75" cy="65" r="10" fill="#FFF59D"/>
  <circle cx="95" cy="65" r="10" fill="#FFF59D"/>
  <circle cx="75" cy="85" r="10" fill="#FFF59D"/>
  <circle cx="95" cy="85" r="10" fill="#FFF59D"/>
  <!-- Flower center -->
  <circle cx="85" cy="75" r="14" fill="#FF8F00"/>
  <circle cx="85" cy="75" r="8" fill="#FF6F00"/>

  <!-- Distinct LEAF at upper-right – label Leaf (70%=238, 18%=61) -->
  <!-- Leaf shape: elongated ellipse with midrib -->
  <ellipse cx="238" cy="65" rx="18" ry="30" fill="#81C784" transform="rotate(-28 238 65)"/>
  <ellipse cx="238" cy="65" rx="18" ry="30" fill="none" stroke="#388E3C" stroke-width="1.5" transform="rotate(-28 238 65)"/>
  <!-- Leaf midrib -->
  <line x1="224" y1="80" x2="252" y2="50" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <!-- More leaves in that area to fill the canopy -->
  <ellipse cx="258" cy="52" rx="14" ry="22" fill="#66BB6A" transform="rotate(-15 258 52)"/>
  <ellipse cx="222" cy="50" rx="15" ry="23" fill="#76C97A" transform="rotate(-38 222 50)"/>

  <!-- Extra leaves scattered on canopy -->
  <ellipse cx="130" cy="90" rx="16" ry="24" fill="#81C784" transform="rotate(20 130 90)"/>
  <ellipse cx="195" cy="58" rx="14" ry="20" fill="#66BB6A" transform="rotate(-10 195 58)"/>
</svg>
