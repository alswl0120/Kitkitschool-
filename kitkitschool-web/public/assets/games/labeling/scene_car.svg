<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <!-- Background -->
  <rect width="340" height="340" fill="#EBF5FB" rx="20"/>
  <!-- Road -->
  <rect x="0" y="270" width="340" height="70" fill="#78909C" rx="0"/>
  <rect x="0" y="295" width="340" height="6" fill="#FFEB3B" opacity="0.5"/>
  <!-- Road dashes -->
  <rect x="20" y="295" width="60" height="6" fill="#FFEB3B"/>
  <rect x="140" y="295" width="60" height="6" fill="#FFEB3B"/>
  <rect x="260" y="295" width="60" height="6" fill="#FFEB3B"/>

  <!-- Car facing RIGHT. Front (Hood) on right, Trunk (boot) on left -->

  <!-- Car body lower (main rectangle) -->
  <rect x="30" y="195" width="300" height="75" rx="12" fill="#E53935"/>
  <!-- Body highlight top edge -->
  <rect x="30" y="195" width="300" height="8" rx="12" fill="#EF5350"/>

  <!-- Car roof / cabin (trapezoid shape) -->
  <!-- Trunk side (left): cabin starts around x=80, Hood side (right): cabin ends ~x=255 -->
  <path d="M88 195 L108 132 L255 132 L272 195 Z" fill="#EF5350"/>
  <path d="M88 195 L108 132 L255 132 L272 195 Z" fill="none" stroke="#C62828" stroke-width="2"/>

  <!-- Windshield (front, right side) ~x=215-268, top y=135 -->
  <path d="M216 134 L268 134 L270 193 L218 193 Z" fill="#B3E5FC" opacity="0.85"/>
  <path d="M216 134 L268 134 L270 193 L218 193 Z" fill="none" stroke="#C62828" stroke-width="2"/>
  <!-- Windshield reflection -->
  <path d="M224 140 L240 140 L240 160 L224 160 Z" fill="white" opacity="0.25"/>

  <!-- Window (middle/door window) label Window (50%=170, 28%=95) -->
  <!-- Center window near x=155-210, y=134-193 -->
  <path d="M112 134 L214 134 L216 193 L114 193 Z" fill="#B3E5FC" opacity="0.8"/>
  <path d="M112 134 L214 134 L216 193 L114 193 Z" fill="none" stroke="#C62828" stroke-width="2"/>
  <!-- Window reflection -->
  <path d="M120 142 L148 142 L148 168 L120 168 Z" fill="white" opacity="0.2"/>

  <!-- Rear window (small, left side) -->
  <path d="M90 136 L110 136 L112 193 L92 193 Z" fill="#B3E5FC" opacity="0.75"/>
  <path d="M90 136 L110 136 L112 193 L92 193 Z" fill="none" stroke="#C62828" stroke-width="2"/>

  <!-- Door outline – label Door (45%=153, 62%=211) -->
  <!-- Door: vertical line between front and rear at x≈113 -->
  <line x1="113" y1="198" x2="113" y2="262" stroke="#C62828" stroke-width="3"/>
  <!-- Door handle near label center (153, 211) -->
  <rect x="130" y="226" width="42" height="10" rx="5" fill="#C62828"/>
  <rect x="130" y="226" width="42" height="10" rx="5" fill="none" stroke="#B71C1C" stroke-width="1.5"/>

  <!-- Hood (front/right) – label Hood (80%=272, 48%=163) -->
  <!-- Hood = sloped front panel -->
  <path d="M272 195 Q308 185 325 200 L325 262 L275 262 Z" fill="#E53935"/>
  <path d="M272 195 Q308 185 325 200" stroke="#C62828" stroke-width="3" fill="none"/>
  <!-- Headlight -->
  <ellipse cx="320" cy="218" rx="12" ry="9" fill="#FFEE58"/>
  <ellipse cx="320" cy="218" rx="8" ry="6" fill="#FFFF8D"/>

  <!-- Trunk/boot (rear/left) – label Trunk (12%=41, 52%=177) -->
  <!-- Trunk = rear panel of car -->
  <path d="M88 195 Q52 188 30 205 L30 262 L90 262 Z" fill="#E53935"/>
  <path d="M88 195 Q52 188 30 205" stroke="#C62828" stroke-width="3" fill="none"/>
  <!-- Tail light -->
  <ellipse cx="34" cy="220" rx="9" ry="7" fill="#FF1744"/>
  <ellipse cx="34" cy="220" rx="6" ry="4.5" fill="#FF6F00"/>
  <!-- Trunk handle / boot line -->
  <path d="M40 245 Q62 238 88 245" stroke="#C62828" stroke-width="2.5" fill="none"/>

  <!-- Rear wheel – label Wheel (28%=95, 82%=279) -->
  <circle cx="95" cy="278" r="38" fill="#37474F"/>
  <circle cx="95" cy="278" r="28" fill="#546E7A"/>
  <circle cx="95" cy="278" r="18" fill="#90A4AE"/>
  <circle cx="95" cy="278" r="9" fill="#CFD8DC"/>
  <!-- Wheel bolts -->
  <circle cx="95" cy="261" r="4" fill="#78909C"/>
  <circle cx="95" cy="295" r="4" fill="#78909C"/>
  <circle cx="78" cy="278" r="4" fill="#78909C"/>
  <circle cx="112" cy="278" r="4" fill="#78909C"/>

  <!-- Front wheel -->
  <circle cx="255" cy="278" r="38" fill="#37474F"/>
  <circle cx="255" cy="278" r="28" fill="#546E7A"/>
  <circle cx="255" cy="278" r="18" fill="#90A4AE"/>
  <circle cx="255" cy="278" r="9" fill="#CFD8DC"/>
  <circle cx="255" cy="261" r="4" fill="#78909C"/>
  <circle cx="255" cy="295" r="4" fill="#78909C"/>
  <circle cx="238" cy="278" r="4" fill="#78909C"/>
  <circle cx="272" cy="278" r="4" fill="#78909C"/>
</svg>
