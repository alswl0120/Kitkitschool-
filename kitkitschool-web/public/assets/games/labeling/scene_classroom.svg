<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" width="340" height="340">
  <!-- Background (classroom wall) -->
  <rect width="340" height="340" fill="#E3F2FD" rx="20"/>
  <!-- Blackboard in background -->
  <rect x="40" y="15" width="260" height="100" rx="8" fill="#4E6B4E"/>
  <rect x="40" y="15" width="260" height="100" rx="8" fill="none" stroke="#388E3C" stroke-width="3"/>
  <!-- Chalk writing on board -->
  <text x="85" y="55" font-family="sans-serif" font-size="18" fill="white" opacity="0.7">A B C D E F</text>
  <text x="95" y="82" font-family="sans-serif" font-size="16" fill="white" opacity="0.5">1 + 1 = 2</text>
  <!-- Board rail -->
  <rect x="40" y="112" width="260" height="8" rx="3" fill="#795548"/>

  <!-- Desk surface – label Desk (50%=170, 85%=289) -->
  <rect x="30" y="238" width="280" height="90" rx="12" fill="#BCAAA4"/>
  <rect x="30" y="238" width="280" height="90" rx="12" fill="none" stroke="#8D6E63" stroke-width="3"/>
  <!-- Desk top surface -->
  <rect x="35" y="243" width="270" height="50" rx="10" fill="#D7CCC8"/>
  <!-- Desk grain -->
  <line x1="35" y1="268" x2="305" y2="268" stroke="#BCAAA4" stroke-width="1.5" opacity="0.5"/>
  <!-- Desk legs -->
  <rect x="50" y="328" width="18" height="12" rx="4" fill="#8D6E63"/>
  <rect x="272" y="328" width="18" height="12" rx="4" fill="#8D6E63"/>

  <!-- Book – label Book (30%=102, 30%=102) -->
  <!-- Book cover (closed) lying on desk area, slightly above desk for visibility -->
  <rect x="60" y="155" width="84" height="108" rx="6" fill="#EF5350"/>
  <!-- Book spine -->
  <rect x="60" y="155" width="12" height="108" rx="4" fill="#C62828"/>
  <!-- Book pages edge -->
  <rect x="72" y="157" width="72" height="104" rx="0" fill="#FFF9C4"/>
  <!-- Page lines -->
  <line x1="80" y1="172" x2="136" y2="172" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="80" y1="184" x2="136" y2="184" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="80" y1="196" x2="136" y2="196" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="80" y1="208" x2="130" y2="208" stroke="#BDBDBD" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="132" y2="220" stroke="#BDBDBD" stroke-width="1.5"/>
  <!-- Book title area -->
  <rect x="78" y="158" width="66" height="10" rx="2" fill="#FFCDD2"/>

  <!-- Pen – label Pen (58%=197, 48%=163) -->
  <!-- Pen body (diagonal) -->
  <rect x="185" y="130" width="14" height="80" rx="7" fill="#1565C0" transform="rotate(12 192 170)"/>
  <!-- Pen clip -->
  <rect x="188" y="133" width="4" height="35" rx="2" fill="#0D47A1" transform="rotate(12 192 170)"/>
  <!-- Pen tip -->
  <path d="M179 204 L187 218 L195 204 Z" fill="#9E9E9E" transform="rotate(12 187 211)"/>
  <!-- Pen top button -->
  <rect x="185" y="128" width="14" height="10" rx="5" fill="#42A5F5" transform="rotate(12 192 133)"/>

  <!-- Ruler – label Ruler (72%=245, 62%=211) -->
  <!-- Ruler body (slightly diagonal) -->
  <rect x="210" y="175" width="82" height="20" rx="4" fill="#FFEE58" transform="rotate(8 251 185)"/>
  <rect x="210" y="175" width="82" height="20" rx="4" fill="none" stroke="#F9A825" stroke-width="1.5" transform="rotate(8 251 185)"/>
  <!-- Ruler markings -->
  <line x1="220" y1="178" x2="220" y2="192" stroke="#F57F17" stroke-width="1.5" transform="rotate(8 251 185)"/>
  <line x1="230" y1="180" x2="230" y2="190" stroke="#F57F17" stroke-width="1" transform="rotate(8 251 185)"/>
  <line x1="240" y1="178" x2="240" y2="192" stroke="#F57F17" stroke-width="1.5" transform="rotate(8 251 185)"/>
  <line x1="250" y1="180" x2="250" y2="190" stroke="#F57F17" stroke-width="1" transform="rotate(8 251 185)"/>
  <line x1="260" y1="178" x2="260" y2="192" stroke="#F57F17" stroke-width="1.5" transform="rotate(8 251 185)"/>
  <line x1="270" y1="180" x2="270" y2="190" stroke="#F57F17" stroke-width="1" transform="rotate(8 251 185)"/>
  <line x1="280" y1="178" x2="280" y2="192" stroke="#F57F17" stroke-width="1.5" transform="rotate(8 251 185)"/>

  <!-- Eraser – label Eraser (42%=143, 68%=231) -->
  <rect x="118" y="220" width="50" height="26" rx="7" fill="#F8BBD0"/>
  <rect x="118" y="220" width="50" height="26" rx="7" fill="none" stroke="#F48FB1" stroke-width="2"/>
  <!-- Eraser label text -->
  <rect x="122" y="226" width="42" height="14" rx="4" fill="#FCE4EC"/>
  <!-- Eraser stripe -->
  <line x1="142" y1="220" x2="142" y2="246" stroke="#F48FB1" stroke-width="2"/>
</svg>
